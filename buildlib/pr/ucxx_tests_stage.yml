parameters:
  dependsOn: [Static_check]
  cpu_container: ucxx_rapidsai_ci_conda
  gpu_container: ucxx_rapidsai_ci_conda_gpu
  slices:
    # CPU coverage: cuda x arch x py grid; builds conda C++/Python pkgs and
    # runs UCXX gtests on host transports (CUDA-free subset).
    - name: x86_64_cuda12_py311
      gpu: false
      demands: ucx_docker -equals yes
      rapids_cuda_version: '12.9.1'
      rapids_py_version: '3.11'
    - name: x86_64_cuda13_py311
      gpu: false
      demands: ucx_docker -equals yes
      rapids_cuda_version: '13.2.0'
      rapids_py_version: '3.11'
    - name: aarch64_cuda12_py311
      gpu: false
      demands: ucx_arm64
      rapids_cuda_version: '12.9.1'
      rapids_py_version: '3.11'
    - name: aarch64_cuda13_py311
      gpu: false
      demands: ucx_arm64
      rapids_cuda_version: '13.2.0'
      rapids_py_version: '3.11'
    # GPU coverage: x86_64 only (MLNX ucx_gpu_test pool has no arm64 hosts);
    # py 3.12 + 3.13 to exercise both supported toolchains.
    - name: amd64_cuda1302_py312
      gpu: true
      demands: ucx_gpu_test -equals yes
      rapids_cuda_version: '13.0.2'
      rapids_py_version: '3.12'
    - name: amd64_cuda1322_py313
      gpu: true
      demands: ucx_gpu_test -equals yes
      rapids_cuda_version: '13.2.0'
      rapids_py_version: '3.13'

stages:
  - stage: UCXX_tests
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - ${{ each slice in parameters.slices }}:
        - job: ucxx_tests_${{ slice.name }}
          workspace:
            clean: all
          pool:
            name: MLNX
            demands: ${{ slice.demands }}
          ${{ if eq(slice.gpu, true) }}:
            displayName: 'UCXX GPU tests (${{ slice.name }})'
            container: ${{ parameters.gpu_container }}
            timeoutInMinutes: 120
          ${{ if eq(slice.gpu, false) }}:
            displayName: 'UCXX tests (${{ slice.name }})'
            container: ${{ parameters.cpu_container }}
            timeoutInMinutes: 90
          variables:
            IS_GPU: ${{ slice.gpu }}
            RAPIDS_CUDA_VERSION: ${{ slice.rapids_cuda_version }}
            RAPIDS_PY_VERSION: ${{ slice.rapids_py_version }}
            UCX_DIR: $(Agent.BuildDirectory)/ucx
            UCXX_DIR: $(Agent.BuildDirectory)/ucxx

          steps:
            - checkout: self
              path: ucx
              fetchDepth: 100
              retryCountOnTaskFailure: 5

            - checkout: ucxx
              path: ucxx
              retryCountOnTaskFailure: 5

            - bash: bash $(UCX_DIR)/buildlib/tools/test_ucxx.sh build
              displayName: Build UCXX

            - bash: bash $(UCX_DIR)/buildlib/tools/test_ucxx.sh test_cpp
              displayName: Run UCXX C++ tests

            - ${{ if eq(slice.gpu, true) }}:
              - bash: bash $(UCX_DIR)/buildlib/tools/test_ucxx.sh test_python
                displayName: Run UCXX Python tests
