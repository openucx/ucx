jobs:
  - job: SetupServer
    displayName: Setup Server
    pool:
      name: MLNX
      demands: mad_server
    workspace:
      clean: outputs
    steps:
      - checkout: self
        clean: true
        fetchDepth: 100
        retryCountOnTaskFailure: 5
      - bash: |
          source ./buildlib/tools/test_mad.sh
          node_setup
          build_ucx_in_docker
          docker_run_srv
        displayName: Setup Server
      - task: Bash@3
        name: Set_Vars
        inputs:
          targetType: "inline"
          script: |
            source ./buildlib/tools/test_mad.sh
            set_vars
        displayName: Set Vars

  - job: SetupClient
    displayName: Setup Client
    pool:
      name: MLNX
      demands: mad_client
    workspace:
      clean: outputs
    steps:
      - checkout: self
        clean: true
        fetchDepth: 100
        retryCountOnTaskFailure: 5
      - bash: |
          source ./buildlib/tools/test_mad.sh
          node_setup
          build_ucx
        displayName: Setup Client

  - job: TestLid
    dependsOn:
      - SetupServer
      - SetupClient
    displayName: Test Lid
    timeoutInMinutes: 10
    pool:
      name: MLNX
      demands: mad_client
    variables:
      LID: $[ dependencies.SetupServer.outputs['Set_Vars.LID'] ]
    steps:
      - checkout: none
      - bash: |
          source ./buildlib/tools/test_mad.sh
          run_mad_test_lid
        env:
          LID: $(LID)
        displayName: Test LID

  - job: ServerRestart
    dependsOn: TestLid
    displayName: Server Restart
    pool:
      name: MLNX
      demands: mad_server
    steps:
      - checkout: none
      - bash: |
          docker stop ucx_perftest_$(Build.BuildId)
          source ./buildlib/tools/test_mad.sh
          docker_run_srv
        displayName: Server Restart

  - job: TestGuid
    dependsOn:
      - SetupServer
      - ServerRestart
    displayName: Test Guid
    timeoutInMinutes: 10
    pool:
      name: MLNX
      demands: mad_client
    variables:
      GUID: $[ dependencies.SetupServer.outputs['Set_Vars.GUID'] ]
    steps:
      - checkout: none
      - bash: |
          source ./buildlib/tools/test_mad.sh
          run_mad_test_guid
        env:
          GUID: $(GUID)
        displayName: Test GUID

  - job: ServerStop
    dependsOn: TestGuid
    displayName: Server Stop
    condition: always()
    pool:
      name: MLNX
      demands: mad_server
    steps:
      - checkout: none
      - bash: |
          docker stop ucx_perftest_$(Build.BuildId)
        displayName: Server Stop
