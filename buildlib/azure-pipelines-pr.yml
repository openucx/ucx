# See https://aka.ms/yaml
# This pipeline to be run on PRs

trigger: none
pr:
  branches:
    include:
    - master
    - v*.*.x
  paths:
    exclude:
    - .agents
    - .ci
    - .claude/skills
    - .gitignore
    - .readthedocs.yaml
    - AGENTS.md
    - "**/AGENTS.md"
    - CLAUDE.md
    - contrib/pr_merge_check.py
    - contrib/check_qps.sh
    - docs/source
    - docs/CodeStyle.md
    - docs/LoggingStyle.md
    - docs/OptimizationStyle.md
    - README.md
    - REVIEW.md
    - NEWS
    - AUTHORS
    - buildlib/azure-pipelines-perf.yml
    - buildlib/tools/perf_results.py
    - buildlib/tools/perf-common.yml

resources:
  repositories:
    - repository: ucxx
      type: github
      name: rapidsai/ucxx
      endpoint: Mellanox-lab
      ref: 30e0d1ac3983db7b303f3ffe3da6caf98456c2e9

extends:
  template: pr/main.yml
