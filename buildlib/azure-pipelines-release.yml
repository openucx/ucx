# See https://aka.ms/yaml
# This pipeline to be run on tags creation

trigger:
  tags:
    include:
      - v*
pr:
  - master
  - v*.*.x

# UCXX nightlies are not built here - they stay RAPIDS-side. This stage only
# builds UCXX on a UCX release tag (publishing itself is deferred; see the
# per-job notes in pr/ucxx_build.yml).
variables:
  DOCKER_OPT_VOLUMES: -v /hpc/local:/hpc/local
  DOCKER_OPT_ARGS: --cap-add=SYS_PTRACE

resources:
  repositories:
    - repository: ucxx
      type: github
      name: rapidsai/ucxx
      endpoint: Mellanox-lab
      ref: 30e0d1ac3983db7b303f3ffe3da6caf98456c2e9

  containers:
    # x86_64
    - container: centos7_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/centos7-mofed5-cuda11:3
      options: $(DOCKER_OPT_VOLUMES)
    - container: centos8_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/centos8-mofed5-cuda11:3
      options: $(DOCKER_OPT_VOLUMES)
    - container: ubuntu16_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu16.04-mofed5-cuda11:3
    - container: ubuntu18_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu18.04-mofed5-cuda11:3
    - container: ubuntu20_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu20.04-mofed5-cuda11:3
    - container: ubuntu22_cuda11_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu22.04-mofed5-cuda11:3
    - container: centos7_cuda12_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/centos7-mofed5-cuda12:3
      options: $(DOCKER_OPT_VOLUMES)
    - container: ubuntu18_cuda12_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu18.04-mofed5-cuda12:3
    - container: ubuntu20_cuda12_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu20.04-mofed5-cuda12:3
    - container: ubuntu22_cuda12_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu22.04-mofed5-cuda12:3
    - container: ubuntu24_cuda12_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu24.04-mofed24.10-cuda12.5:1
    - container: ubuntu22_cuda13_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu22.04-mofed5-cuda13:1
    - container: ubuntu24_cuda13_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/ubuntu24.04-mofed24.10-cuda13:1
    - container: rocky8_cuda13_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/rocky8-mofed24.10-cuda13:1
      options: $(DOCKER_OPT_VOLUMES)
    - container: rocky9_cuda13_x86_64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/x86_64/rocky9-mofed24.10-cuda13:1
      options: $(DOCKER_OPT_VOLUMES)

    # aarch64
    - container: centos8_cuda11_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/centos8-mofed5-cuda11:3
      options: $(DOCKER_OPT_VOLUMES)
    - container: ubuntu18_cuda11_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu18.04-mofed5-cuda11:3
    - container: ubuntu20_cuda11_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu20.04-mofed5-cuda11:3
    - container: ubuntu22_cuda11_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu22.04-mofed5-cuda11:3
    - container: ubuntu20_cuda12_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu20.04-mofed5-cuda12:3
    - container: ubuntu22_cuda12_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu22.04-mofed5-cuda12:3
    - container: ubuntu24_cuda12_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu24.04-mofed24.10-cuda12.5:1
    - container: ubuntu22_cuda13_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu22.04-mofed5-cuda13:1
    - container: ubuntu24_cuda13_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/ubuntu24.04-mofed24.10-cuda13:1
    - container: rocky8_cuda13_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/rocky8-mofed24.10-cuda13:2
      options: $(DOCKER_OPT_VOLUMES)
    - container: rocky9_cuda13_aarch64
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/aarch64/rocky9-mofed24.10-cuda13:2
      options: $(DOCKER_OPT_VOLUMES)

    # UCXX release: CPU-only conda + wheel builders (mirrors PR pipeline).
    # Wheel images are CUDA-pinned: one base per CUDA version (see rapidsai-ci-wheel.Dockerfile).
    - container: ucxx_rapidsai_ci_conda
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/rapidsai-ci-conda:26.08-azp-1
      options: $(DOCKER_OPT_ARGS) $(DOCKER_OPT_VOLUMES)
    - container: ucxx_rapidsai_ci_wheel_cuda12
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/rapidsai-ci-wheel:26.08-cuda12-azp-1
      options: $(DOCKER_OPT_ARGS) $(DOCKER_OPT_VOLUMES)
    - container: ucxx_rapidsai_ci_wheel_cuda13
      image: rdmz-harbor.rdmz.labs.mlnx/ucx/rapidsai-ci-wheel:26.08-cuda13-azp-2
      options: $(DOCKER_OPT_ARGS) $(DOCKER_OPT_VOLUMES)

stages:
  - stage: Prepare
    jobs:
      - job: CheckRelease
        pool:
          name: MLNX
          demands:
          - ucx_docker
        workspace:
          clean: all
        steps:
          - checkout: self
            fetchDepth: 100
            clean: true
            retryCountOnTaskFailure: 5

          - bash: |
              set -eE
              source ./buildlib/az-helpers.sh
              set -x
              check_release_build $(Build.Reason) $(Build.SourceVersion) "AZP/RELEASE: "
            name: Result
            displayName: Check build condition


  - stage: GitHubDraft
    condition: eq(dependencies.Prepare.outputs['CheckRelease.Result.Launch'], 'True')
    dependsOn: Prepare
    jobs:
    - template: az-github-draft.yml
      parameters:
        arch: x86_64
        container: centos7_cuda11_x86_64
        demands: ucx_docker

    - template: az-github-draft.yml
      parameters:
        arch: aarch64
        container: centos8_cuda11_aarch64
        demands: ucx-arm64


  - stage: Build
    displayName: Build binary packages
    dependsOn:
      - Prepare
      - GitHubDraft
    condition: eq(dependencies.Prepare.outputs['CheckRelease.Result.Launch'], 'True')
    jobs:
      - template: az-distro-release.yml
        parameters:
          arch: x86_64
          demands: ucx_docker

      - template: az-distro-release.yml
        parameters:
          arch: aarch64
          demands: ucx-arm64

      - template: jucx/jucx-build.yml
        parameters:
          arch: amd64
          container: centos8_cuda11_x86_64
          demands: ucx_docker
          target: publish-release

      - template: jucx/jucx-build.yml
        parameters:
          arch: aarch64
          container: centos8_cuda11_aarch64
          demands: ucx-arm64
          target: publish-release

  - template: pr/ucxx_build.yml
    parameters:
      dependsOn: [Prepare]
      # Build UCXX on a UCX release tag. Publishing is deferred (per-job notes):
      # wheels -> Kitmaker/PyPI, conda -> conda-forge once upstream; nightlies
      # stay RAPIDS-side.
      condition: eq(dependencies.Prepare.outputs['CheckRelease.Result.Launch'], 'True')
      conda_cpp_slices:
        - { name: x86_64_cuda12_py311,  demands: ucx_docker, rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: x86_64_cuda13_py311,  demands: ucx_docker, rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
        - { name: aarch64_cuda12_py311, demands: ucx_arm64,  rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: aarch64_cuda13_py311, demands: ucx_arm64,  rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
      conda_python_slices:
        - { name: x86_64_cuda12_py311,  demands: ucx_docker, rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: x86_64_cuda13_py311,  demands: ucx_docker, rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
        - { name: aarch64_cuda12_py311, demands: ucx_arm64,  rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: aarch64_cuda13_py311, demands: ucx_arm64,  rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
      # libucxx + ucxx wheels for cuda12 + cuda13, x86_64 + aarch64.
      wheel_libucxx_slices:
        - { name: x86_64_cuda12_py311,  container: ucxx_rapidsai_ci_wheel_cuda12, demands: ucx_docker, rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: x86_64_cuda13_py311,  container: ucxx_rapidsai_ci_wheel_cuda13, demands: ucx_docker, rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
        - { name: aarch64_cuda12_py311, container: ucxx_rapidsai_ci_wheel_cuda12, demands: ucx_arm64,  rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: aarch64_cuda13_py311, container: ucxx_rapidsai_ci_wheel_cuda13, demands: ucx_arm64,  rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
      wheel_ucxx_slices:
        - { name: x86_64_cuda12_py311,  container: ucxx_rapidsai_ci_wheel_cuda12, libucxx_slice: x86_64_cuda12_py311,  demands: ucx_docker, rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: x86_64_cuda13_py311,  container: ucxx_rapidsai_ci_wheel_cuda13, libucxx_slice: x86_64_cuda13_py311,  demands: ucx_docker, rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
        - { name: aarch64_cuda12_py311, container: ucxx_rapidsai_ci_wheel_cuda12, libucxx_slice: aarch64_cuda12_py311, demands: ucx_arm64,  rapids_cuda_version: '12.9.1', rapids_py_version: '3.11' }
        - { name: aarch64_cuda13_py311, container: ucxx_rapidsai_ci_wheel_cuda13, libucxx_slice: aarch64_cuda13_py311, demands: ucx_arm64,  rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
      docs_slices:
        - { name: x86_64_cuda13_py311, cpp_slice: x86_64_cuda13_py311, python_slice: x86_64_cuda13_py311,
            demands: ucx_docker, rapids_cuda_version: '13.3.0', rapids_py_version: '3.11' }
