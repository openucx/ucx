---
job: ucx-test

failFast: false
timeout_minutes: 240

kubernetes:
  cloud: il-ipp-blossom-prod-nbu-swx-ucx
  namespace: nbu-swx-ucx
  limits: "{memory: 16Gi, cpu: 10000m}"
  requests: "{memory: 16Gi, cpu: 10000m}"
# mofed-26.04-0.7.6.0
runs_on_dockers:
  # HCA RoCE (CX7)
  - {
      name: "hca-roce",
      url: "harbor.mellanox.com/hpcx/x86_64/ubuntu24.04/builder:mofed-24.10-3.2.5.0",
      arch: x86_64,
      tolerations: "[{key: 'node.kubernetes.io/unschedulable', operator: 'Exists', effect: 'NoSchedule'}]",
      annotations: [{ key: "k8s.v1.cni.cncf.io/networks", value: "sriov-cx7-p2" }],
      limits: "{memory: 16Gi, cpu: 10000m, nvidia.com/sriov_cx7_p2: 1}",
      requests: "{memory: 16Gi, cpu: 10000m, nvidia.com/sriov_cx7_p2: 1}",
      caps_add: "[ IPC_LOCK, NET_RAW ]"
    }
  # HCA IB (CX8)
  - {
      name: "hca-ib",
      url: "harbor.mellanox.com/hpcx/x86_64/ubuntu24.04/builder:mofed-24.10-3.2.5.0",
      arch: x86_64,
      tolerations: "[{key: 'node.kubernetes.io/unschedulable', operator: 'Exists', effect: 'NoSchedule'}]",
      annotations: [{ key: "k8s.v1.cni.cncf.io/networks", value: "cx8-ib-network" }],
      limits: "{memory: 16Gi, cpu: 10000m, nvidia.com/cx8_vfs: 1}",
      requests: "{memory: 16Gi, cpu: 10000m, nvidia.com/cx8_vfs: 1}",
      caps_add: "[ IPC_LOCK, NET_RAW ]"
    }

matrix:
  axes:
    arch: [x86_64]
    worker: [0, 1, 2, 3]

taskName: '${name}/${arch}/w${worker}'

env:
  RUN_TESTS: "yes"
  TEST_PERF: "0"
  VALGRIND_CHECK: "no"
  nworkers: "4"
  STEP_TIMEOUT_MINUTES: "180"

steps:
  - name: Test
    parallel: false
    timeout: "${STEP_TIMEOUT_MINUTES}"
    run: |
      # Raise memlock for RDMA pinning. Cap with what the container actually allows.
      ulimit -l unlimited 2>/dev/null || true
      echo "memlock soft=$(ulimit -l) hard=$(ulimit -Hl)"

      # Pin gtest to up to 4 CPUs in k8s: keeps max_threads bounded (similar to Azure
      # CPU affinity) while giving the UCS async thread headroom alongside gtest workers
      # and UCP progress threads. A 2-CPU mask starved async under MT variants and
      # exposed a poll_missed race in rdmacm.
      cpu_width=4
      allowed_cpus=$(awk '/^Cpus_allowed_list:/ {print $2}' /proc/self/status)
      first_chunk=${allowed_cpus%%,*}
      if [[ "${first_chunk}" == *-* ]]; then
        start_cpu=${first_chunk%-*}
        end_cpu=${first_chunk#*-}
        max_end=$((start_cpu + cpu_width - 1))
        if [ "${end_cpu}" -gt "${max_end}" ]; then
          end_cpu=${max_end}
        fi
        if [ "${end_cpu}" -gt "${start_cpu}" ]; then
          cpu_set="${start_cpu}-${end_cpu}"
        else
          cpu_set="${start_cpu}"
        fi
      else
        cpu_set="${first_chunk}"
      fi

      echo "Running test_jenkins.sh with CPU affinity: ${cpu_set} (allowed: ${allowed_cpus})"
      taskset -c "${cpu_set}" ./contrib/test_jenkins.sh
